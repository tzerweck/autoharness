[experiment]
name = "ace-tau-real-airline-bedrock"
workspace_root = "../../agentic-context-engine-22-04"
stack = "python"
max_iterations = 8

[proposer]
backend = "command"
max_turns = 50
command = ["your-agent-cli", "run"]

[runner]
kind = "script"

[runner.env]
AUTOHARNESS_TAU2_ROOT = "../../tau2-bench"
AUTOHARNESS_ACE_DOMAIN = "airline"
AUTOHARNESS_ACE_AGENT_MODEL = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
AUTOHARNESS_ACE_USER_MODEL = "gpt-4.1-2025-04-14"
AUTOHARNESS_ACE_REFLECTOR_MODEL = "bedrock/us.anthropic.claude-sonnet-4-6"
AUTOHARNESS_ACE_SKILL_MANAGER_MODEL = "bedrock/us.anthropic.claude-sonnet-4-6"
AUTOHARNESS_ACE_REFLECTOR_IMPL = "simple"
AUTOHARNESS_ACE_RR_ENABLE_SUBAGENT = "true"
AUTOHARNESS_ACE_RR_SUBAGENT_MODEL = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
AUTOHARNESS_ACE_AGENT_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_ACE_USER_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_ACE_REFLECTOR_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_ACE_SKILL_MANAGER_LLM_ARGS_JSON = '{"temperature": 0.0}'

[runner.script]
command = [".venv/bin/python", "../examples/ace_tau_real/eval/run_with_ace_python.py", "../examples/ace_tau_real/eval/run_ace_tau_split.py"]
result_json_path = "result.json"

[policy]
primary_metric = "mean_score"
holdout_every = 2
require_holdout_for_promotion = true
prefer_simpler_on_tie = true

[validation]
kind = "script"
script = [".venv/bin/python", "../examples/ace_tau_real/eval/run_with_ace_python.py", "../examples/ace_tau_real/eval/validate_ace_workspace.py"]
timeout_sec = 60.0

[context]
history_strategy = "recent_plus_best"
max_candidates = 8
include_diffs = true
include_train_traces = true
include_holdout_details = false

[reporting]
emit_markdown = true
emit_json = true

[surfaces.ace_code]
kind = "workspace_tree"
target = "ace"
base_dir = "ace"

[[cases]]
id = "train.airline_0000"
runner_ref = "tau2.airline.task.0"
split = "train"
metadata = { task_id = "0", num_trials = 1, manifest = "eval/train_task_ids.txt" }

