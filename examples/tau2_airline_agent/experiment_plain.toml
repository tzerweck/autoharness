[experiment]
name = "tau2-airline-agent-plain"
workspace_root = "."
stack = "python"
max_iterations = 8

[proposer]
backend = "command"
max_turns = 50
command = ["your-agent-cli", "run"]

[runner]
kind = "script"
project_root = "."

[runner.script]
command = ["python", "eval/run_tau2_split.py"]
result_json_path = "result.json"

[runner.env]
AUTOHARNESS_TAU2_MODE_OVERRIDE = "plain"
AUTOHARNESS_TAU2_AGENT_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_TAU2_USER_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_TAU2_REFLECTOR_LLM_ARGS_JSON = '{"temperature": 0.0}'
AUTOHARNESS_TAU2_SKILL_MANAGER_LLM_ARGS_JSON = '{"temperature": 0.0}'

[policy]
primary_metric = "mean_score"
holdout_every = 2
require_holdout_for_promotion = true
prefer_simpler_on_tie = true

[validation]
kind = "python_import"
entrypoint = "agent:build_agent"
timeout_sec = 30.0

[context]
history_strategy = "recent_plus_best"
max_candidates = 8
include_diffs = true
include_train_traces = true
include_holdout_details = false

[reporting]
emit_markdown = true
emit_json = true

[surfaces.controller]
kind = "workspace_file"
target = "controller.py"
filename = "controller.py"
base_file = "controller.py"

[surfaces.system_prompt]
kind = "workspace_file"
target = "system_prompt.md"
filename = "system_prompt.md"
base_file = "system_prompt.md"

[surfaces.policy_prompt]
kind = "workspace_file"
target = "policy_prompt.md"
filename = "policy_prompt.md"
base_file = "policy_prompt.md"

[surfaces.tool_instructions]
kind = "workspace_file"
target = "tool_instructions.md"
filename = "tool_instructions.md"
base_file = "tool_instructions.md"

[surfaces.skillbook_template]
kind = "workspace_file"
target = "skillbook_template.md"
filename = "skillbook_template.md"
base_file = "skillbook_template.md"

[surfaces.reflector_prompt]
kind = "workspace_file"
target = "reflector_prompt.md"
filename = "reflector_prompt.md"
base_file = "reflector_prompt.md"

[surfaces.skill_manager_prompt]
kind = "workspace_file"
target = "skill_manager_prompt.md"
filename = "skill_manager_prompt.md"
base_file = "skill_manager_prompt.md"

